<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HábitosApp — Mis Logros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">
            <i class="fas fa-check-circle me-2"></i>HábitosApp
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a href="/index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>
            <span class="text-white" id="nombreUsuario"></span>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt me-1"></i>Salir
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Saldo -->
    <div class="card mb-4 text-center">
        <div class="card-body">
            <i class="fas fa-coins fa-2x text-warning mb-2"></i>
            <h2 class="mb-0" id="saldoPuntos">0</h2>
            <p class="text-muted mb-0">puntos</p>
        </div>
    </div>

    <!-- Logros -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="fas fa-trophy me-2 text-warning"></i>Mis Logros</h5>
        </div>
        <div class="card-body">
            <div id="listaLogros" class="row g-3">
                <div class="col-12 text-center text-muted py-4">
                    <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                    <p>Cargando logros...</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/logros.js"></script>
</body>
</html>
