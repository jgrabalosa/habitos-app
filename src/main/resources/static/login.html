<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HábitosApp — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">

            <!-- Logo y título -->
            <div class="text-center mb-4">
                <i class="fas fa-check-circle fa-4x text-primary mb-3"></i>
                <h1 class="h3 fw-bold">HábitosApp</h1>
                <p class="text-muted">Construye hábitos, transforma tu vida</p>
            </div>

            <!-- Tarjeta login/registro -->
            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-4" id="authTabs">
                        <li class="nav-item w-50 text-center">
                            <a class="nav-link active" id="loginTab" href="#">Iniciar sesión</a>
                        </li>
                        <li class="nav-item w-50 text-center">
                            <a class="nav-link" id="registroTab" href="#">Registrarse</a>
                        </li>
                    </ul>

                    <!-- Formulario Login -->
                    <div id="formLogin">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="tu@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="loginContrasena" placeholder="••••••••">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginContrasena', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div id="loginError" class="alert alert-danger d-none"></div>
                        <button class="btn btn-primary w-100" onclick="login()">
                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
                        </button>
                    </div>

                    <!-- Formulario Registro -->
                    <div id="formRegistro" class="d-none">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="regUsername" placeholder="@username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="tu@email.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="regContrasena" placeholder="••••••••">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regContrasena', this)">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div id="registroError" class="alert alert-danger d-none"></div>
                        <div id="registroOk" class="alert alert-success d-none"></div>
                        <button class="btn btn-primary w-100" onclick="registro()">
                            <i class="fas fa-user-plus me-2"></i>Crear cuenta
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
