<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HábitosApp — Hábito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/design-tokens.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">
            <i class="fas fa-check-circle me-2"></i>HábitosApp
        </a>
        <div class="ms-auto">
            <a href="/index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0" id="tituloForm">
                        <i class="fas fa-plus-circle me-2 text-primary"></i>Nuevo hábito
                    </h5>
                </div>
                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre *</label>
                        <input type="text" class="form-control" id="nombre"
                               placeholder="Ej: Beber 2 litros de agua">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="2"
                                  placeholder="Descripción opcional"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Frecuencia *</label>
                        <select class="form-select" id="frecuencia">
                            <option value="DIARIO">Diario</option>
                            <option value="SEMANAL">Semanal</option>
                            <option value="MENSUAL">Mensual</option>
                            <option value="PERSONALIZADO">Personalizado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Meta (veces por periodo)</label>
                        <input type="number" class="form-control" id="meta"
                               value="1" min="1" max="30">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Categoría</label>
                        <select class="form-select" id="categoria">
                            <option value="">Cargando categorías...</option>
                        </select>
                    </div>

                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <div id="okMsg" class="alert alert-success d-none"></div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" id="btnGuardar" onclick="guardarHabito()">
                            <i class="fas fa-save me-2"></i>Guardar hábito
                        </button>
                        <button class="btn btn-outline-danger d-none" id="btnEliminar" onclick="eliminarHabito()">
                            <i class="fas fa-trash me-2"></i>Eliminar hábito
                        </button>
                        <a href="/index.html" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/habito.js"></script>
</body>
</html>
