<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norday — Detalle de hábito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/design-tokens.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
    <style>
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .heatmap-day {
            aspect-ratio: 1;
            border-radius: 8px;
            background-color: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform var(--t-fast);
        }
        .heatmap-day:hover { transform: scale(1.1); }
        .heatmap-day.completado {
            background-color: var(--success);
            color: white;
            font-weight: 700;
        }
        .heatmap-day.hoy {
            outline: 2px solid var(--primary);
            outline-offset: 1px;
        }
        .heatmap-day.futuro { background-color: transparent; }
        .stat-mini { text-align: center; padding: 16px; }
        .stat-mini .numero { font-size: 2rem; font-weight: 800; }
        .footer-espacio { height: 48px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/index.html">
            <i class="fas fa-check-circle me-2"></i>Norday
        </a>
        <div class="ms-auto">
            <a href="/index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <h3 id="nombreHabito" class="mb-4">Cargando...</h3>

            <!-- Stat cards -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card stat-mini bg-white">
                        <div class="numero text-primary">🔥 <span id="rachaActual">0</span></div>
                        <small class="text-muted">Racha actual</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-mini bg-white">
                        <div class="numero text-success">🏆 <span id="rachaMaxima">0</span></div>
                        <small class="text-muted">Mejor racha</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-mini bg-white">
                        <div class="numero text-info"><span id="totalCompletados">0</span></div>
                        <small class="text-muted">Total completados</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-mini bg-white">
                        <div class="numero text-warning"><span id="porcentajeMes">-</span></div>
                        <small class="text-muted">Este mes</small>
                    </div>
                </div>
            </div>

            <!-- Heatmap -->
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <button class="btn btn-sm btn-outline-secondary" onclick="cambiarMes(-1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h6 class="mb-0" id="mesActual">-</h6>
                    <button class="btn btn-sm btn-outline-secondary" id="btnMesSiguiente" onclick="cambiarMes(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div class="heatmap-grid" id="heatmapGrid"></div>
                </div>
            </div>

            <!-- Últimos registros -->
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-history me-2"></i>Últimos registros</h6>
                </div>
                <div class="card-body">
                    <div id="listaRegistros"></div>
                </div>
            </div>

        </div>
    </div>
    <div class="footer-espacio"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/habito-detalle.js"></script>
</body>
</html>
