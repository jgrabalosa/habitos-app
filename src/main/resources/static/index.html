<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norday — Hoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/design-tokens.css" rel="stylesheet">
    <script src="/js/theme.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container" style="max-width: 720px;">
        <a class="navbar-brand" href="#">
            <i class="fas fa-check-circle me-2"></i>Norday
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/logros.html" class="btn btn-outline-light btn-sm" title="Mis logros">
                <i class="fas fa-trophy"></i>
            </a>
            <button class="btn btn-outline-light btn-sm" onclick="alternarTema()" title="Cambiar tema">
                <i class="fas fa-moon" id="iconoTema"></i>
            </button>
            <span class="text-white d-none d-sm-inline" id="nombreUsuario"></span>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 720px;">

    <!-- Cabecera del día -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="fw-bold mb-0">Hoy</h4>
            <small class="text-muted" id="fechaHoy"></small>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='/habito.html'">
            <i class="fas fa-plus me-1"></i>Nuevo hábito
        </button>
    </div>

    <!-- Pendientes -->
    <div id="seccionPendientes" class="mb-4">
        <div id="listaPendientes" class="d-flex flex-column gap-2">
            <div class="text-center text-muted py-4">
                <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                <p>Cargando hábitos...</p>
            </div>
        </div>
    </div>

    <!-- Completados -->
    <div id="seccionCompletados" class="mb-4 d-none">
        <h6 class="text-muted fw-bold mb-2"><i class="fas fa-check me-1"></i>Completados</h6>
        <div id="listaCompletados" class="d-flex flex-column gap-2"></div>
    </div>

    <!-- Modal nota al completar -->
    <div class="modal fade" id="modalNota" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Completar hábito</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Nota (opcional)</label>
                    <textarea class="form-control" id="notaCompletar" rows="3" placeholder="¿Cómo te ha ido?"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="confirmarCompletar()">Completar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor de celebraciones (toasts de logros) -->
    <div id="celebraciones" class="celebraciones-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
