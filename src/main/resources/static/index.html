<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HábitosApp — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-check-circle me-2"></i>HábitosApp
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white" id="nombreUsuario"></span>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt me-1"></i>Salir
            </button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Estadísticas -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card stat-card bg-primary text-white">
                <div class="stat-number" id="totalHabitos">0</div>
                <div class="stat-label">Hábitos activos</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card bg-success text-white">
                <div class="stat-number" id="completadosHoy">0</div>
                <div class="stat-label">Completados hoy</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card bg-warning text-white">
                <div class="stat-number" id="pendientesHoy">0</div>
                <div class="stat-label">Pendientes hoy</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card bg-info text-white">
                <div class="stat-number" id="rachaMax">0</div>
                <div class="stat-label">Mejor racha</div>
            </div>
        </div>
    </div>

    <!-- Hábitos de hoy -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-calendar-day me-2 text-primary"></i>Hábitos de hoy</h5>
            <button class="btn btn-primary btn-sm" onclick="window.location.href='/habito.html'">
                <i class="fas fa-plus me-1"></i>Nuevo hábito
            </button>
        </div>
        <div class="card-body">
            <div id="listaHabitos" class="row g-3">
                <div class="col-12 text-center text-muted py-4">
                    <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                    <p>Cargando hábitos...</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
